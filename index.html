<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f172a">
<title>Mapas PDF + GPS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root{
    --green:#16a34a;--green-d:#15803d;--ink:#0f172a;--ink2:#1e293b;
    --mut:#64748b;--bg:#f1f5f9;--card:#ffffff;--amber:#f59e0b;--red:#dc2626;
    --sat:env(safe-area-inset-top);--sab:env(safe-area-inset-bottom);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;font-family:system-ui,-apple-system,Roboto,Arial,sans-serif;}
  button{font-family:inherit;}
  svg{display:block;}

  /* ============ TELA INICIAL ============ */
  #screenHome{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;}
  #homeHdr{background:var(--card);padding:calc(14px + var(--sat)) 18px 14px;
    box-shadow:0 1px 2px rgba(15,23,42,.06);display:flex;align-items:center;gap:10px;}
  #homeHdr .logo{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,#16a34a,#065f46);
    display:flex;align-items:center;justify-content:center;font-size:20px;}
  #homeHdr h1{font-size:18px;color:var(--ink);letter-spacing:-.02em;}
  #homeHdr p{font-size:11.5px;color:var(--mut);}
  #cards{flex:1;overflow-y:auto;padding:16px 14px calc(96px + var(--sab));
    display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:13px;align-content:start;}
  .card{background:var(--card);border-radius:16px;overflow:hidden;cursor:pointer;
    box-shadow:0 1px 3px rgba(15,23,42,.08),0 4px 14px rgba(15,23,42,.05);
    transition:transform .12s;position:relative;}
  .card:active{transform:scale(.97);}
  .card .thumb{width:100%;aspect-ratio:4/3;object-fit:cover;background:#e2e8f0;display:block;}
  .card .cb{padding:9px 11px 11px;}
  .card .nm{font-size:13.5px;font-weight:650;color:var(--ink);white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis;}
  .card .sub{display:flex;align-items:center;gap:6px;margin-top:5px;flex-wrap:wrap;}
  .badge{font-size:10px;font-weight:650;padding:2.5px 7px;border-radius:999px;}
  .badge.geo{background:#dcfce7;color:#15803d;}
  .badge.nogeo{background:#fef3c7;color:#b45309;}
  .badge.pts{background:#e0e7ff;color:#4338ca;}
  .card .men{position:absolute;top:6px;right:6px;width:32px;height:32px;border:none;
    border-radius:999px;background:rgba(15,23,42,.55);color:#fff;cursor:pointer;
    display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
  #empty{grid-column:1/-1;text-align:center;color:var(--mut);padding:60px 20px;font-size:13.5px;line-height:1.6;}
  #empty .big{font-size:56px;margin-bottom:12px;}
  #fab{position:fixed;right:18px;bottom:calc(20px + var(--sab));z-index:20;
    background:var(--green);color:#fff;border:none;border-radius:999px;height:54px;
    padding:0 22px 0 16px;display:flex;align-items:center;gap:8px;font-size:15px;font-weight:650;
    box-shadow:0 6px 20px rgba(22,163,74,.45);cursor:pointer;}
  #fab:active{background:var(--green-d);}
  #busy{position:fixed;inset:0;z-index:80;background:rgba(15,23,42,.72);display:none;
    align-items:center;justify-content:center;flex-direction:column;gap:14px;color:#fff;font-size:14px;}
  #busy.open{display:flex;}
  .spin{width:38px;height:38px;border-radius:50%;border:3.5px solid rgba(255,255,255,.25);
    border-top-color:#fff;animation:sp 0.8s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg)}}

  /* ============ TELA DO MAPA ============ */
  #screenMap{position:absolute;inset:0;background:#0b1220;display:none;z-index:30;}
  #screenMap.open{display:block;}
  #viewer{position:absolute;inset:0;overflow:hidden;touch-action:none;}
  #wrapper{position:absolute;left:0;top:0;transform-origin:0 0;}
  #mapCanvas{display:block;background:#fff;box-shadow:0 0 34px rgba(0,0,0,.55);border-radius:2px;}
  #hiCanvas{position:absolute;left:0;top:0;pointer-events:none;display:none;}
  #overlay{position:absolute;left:0;top:0;width:100%;height:100%;pointer-events:none;}
  #mapHdr{position:fixed;top:0;left:0;right:0;z-index:30;
    background:rgba(15,23,42,.86);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    color:#fff;display:flex;align-items:center;gap:6px;
    padding:calc(8px + var(--sat)) 10px 8px;}
  #mapHdr .title{flex:1;font-size:14.5px;font-weight:650;white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis;}
  .hbtn{width:40px;height:40px;border:none;border-radius:11px;background:transparent;
    color:#e2e8f0;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:none;}
  .hbtn:active{background:rgba(255,255,255,.12);}
  #status{position:fixed;z-index:25;top:calc(60px + var(--sat));left:50%;transform:translateX(-50%);
    background:rgba(15,23,42,.82);backdrop-filter:blur(8px);color:#e2e8f0;font-size:12px;
    padding:6px 14px;border-radius:999px;max-width:92%;text-align:center;line-height:1.4;
    box-shadow:0 3px 12px rgba(0,0,0,.3);transition:opacity .3s;}
  #toolbar{position:fixed;z-index:30;bottom:calc(16px + var(--sab));left:50%;transform:translateX(-50%);
    background:rgba(15,23,42,.92);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    border-radius:999px;padding:6px;display:flex;gap:2px;box-shadow:0 8px 28px rgba(0,0,0,.45);}
  #toolbar button{width:47px;height:47px;border:none;border-radius:999px;background:transparent;
    color:#cbd5e1;cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;}
  #toolbar button:active{background:rgba(255,255,255,.1);}
  #toolbar button.on{background:var(--green);color:#fff;}
  #toolbar button.warn.on{background:var(--amber);}
  /* marcadores */
  .marker{position:absolute;width:0;height:0;}
  .marker .pin{position:absolute;transform-origin:0 0;transform:scale(var(--iz,1)) translate(-50%,-100%);
    filter:drop-shadow(0 2px 3px rgba(0,0,0,.5));}
  .marker .lbl{position:absolute;transform-origin:0 0;transform:scale(var(--iz,1)) translate(-50%,5px);
    background:rgba(15,23,42,.82);color:#fff;font-size:11px;font-weight:600;
    padding:2px 8px;border-radius:999px;white-space:nowrap;}
  #gpsAcc{position:absolute;border-radius:50%;background:rgba(59,130,246,.14);
    border:1.5px solid rgba(59,130,246,.45);transform:translate(-50%,-50%);display:none;}
  #gpsDot{position:absolute;width:0;height:0;display:none;}
  #gpsDot .d{position:absolute;transform-origin:0 0;transform:scale(var(--iz,1)) translate(-50%,-50%);
    width:19px;height:19px;border-radius:50%;background:#3b82f6;border:3px solid #fff;
    box-shadow:0 0 0 7px rgba(59,130,246,.25),0 2px 8px rgba(0,0,0,.5);}
  /* painel de pontos */
  #panel{position:fixed;left:0;right:0;bottom:0;z-index:45;background:#fff;
    border-radius:20px 20px 0 0;box-shadow:0 -6px 30px rgba(0,0,0,.35);
    max-height:62%;display:none;flex-direction:column;padding-bottom:var(--sab);}
  #panel.open{display:flex;}
  #panel .grab{width:40px;height:4px;border-radius:99px;background:#e2e8f0;margin:9px auto 2px;}
  #panel .ph{display:flex;align-items:center;padding:8px 16px 11px;border-bottom:1px solid #f1f5f9;gap:8px;}
  #panel .ph b{flex:1;font-size:15px;color:var(--ink);}
  .pbtn{border:none;border-radius:10px;padding:9px 13px;font-size:13px;font-weight:650;
    cursor:pointer;display:flex;align-items:center;gap:6px;}
  .pbtn.sec{background:#f1f5f9;color:var(--ink2);}
  .pbtn.pri{background:var(--green);color:#fff;}
  #ptList{overflow-y:auto;flex:1;}
  #ptList .row{display:flex;align-items:center;padding:10px 16px;border-bottom:1px solid #f8fafc;gap:10px;}
  #ptList .dot{width:10px;height:10px;border-radius:99px;background:var(--red);flex:none;}
  #ptList .inf{flex:1;min-width:0;}
  #ptList .nm{font-size:14px;font-weight:650;color:var(--ink);}
  #ptList .co{font-size:11.5px;color:var(--mut);}
  #ptList .row button{border:none;background:#f8fafc;border-radius:9px;width:36px;height:36px;
    cursor:pointer;color:var(--mut);display:flex;align-items:center;justify-content:center;}
  #ptList .empty{padding:26px;text-align:center;color:var(--mut);font-size:13px;line-height:1.6;}
  /* modal */
  #modalBg{position:fixed;inset:0;z-index:70;background:rgba(15,23,42,.6);display:none;
    align-items:center;justify-content:center;padding:22px;}
  #modalBg.open{display:flex;}
  #modal{background:#fff;border-radius:18px;padding:20px;width:100%;max-width:340px;
    box-shadow:0 20px 60px rgba(0,0,0,.35);}
  #modal h3{font-size:15.5px;color:var(--ink);margin-bottom:5px;}
  #modal p{font-size:12.5px;color:var(--mut);margin-bottom:8px;line-height:1.45;}
  #modal label{display:block;font-size:11.5px;font-weight:650;color:var(--ink2);margin:10px 0 4px;}
  #modal input{width:100%;padding:11px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:15px;
    outline:none;}
  #modal input:focus{border-color:var(--green);}
  #modal .btns{display:flex;gap:9px;margin-top:16px;}
  #modal .btns button{flex:1;padding:12px;border:none;border-radius:11px;font-size:14px;
    font-weight:650;cursor:pointer;}
  #mOk{background:var(--green);color:#fff;}
  #mCancel{background:#f1f5f9;color:var(--ink2);}
  .photoBtn{margin-top:12px;width:100%;padding:11px;border:1.5px dashed #cbd5e1;
    border-radius:10px;background:#f8fafc;font-size:14px;color:#334155;cursor:pointer;}
  .photoPrev{margin-top:8px;width:100%;max-height:150px;object-fit:cover;
    border-radius:10px;display:none;}
  #ptList .pthumb{width:44px;height:44px;border-radius:10px;object-fit:cover;
    flex:none;cursor:pointer;background:#e2e8f0;}
  #photoView{position:fixed;inset:0;z-index:90;background:rgba(2,6,23,.94);display:none;
    flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:16px;}
  #photoView.open{display:flex;}
  #photoView img{max-width:100%;max-height:72%;border-radius:12px;
    box-shadow:0 10px 50px rgba(0,0,0,.6);}
  #photoView .pvn{color:#e2e8f0;font-size:14px;font-weight:650;}
  #photoView .pvb{display:flex;gap:10px;}
  #photoView button{border:none;border-radius:11px;padding:11px 18px;font-size:14px;
    font-weight:650;cursor:pointer;background:rgba(255,255,255,.12);color:#fff;}
  #photoView button.rm{background:rgba(220,38,38,.85);}
  /* menu do card */
  #cardMenuBg{position:fixed;inset:0;z-index:60;display:none;}
  #cardMenuBg.open{display:block;}
  #cardMenu{position:absolute;background:#fff;border-radius:14px;overflow:hidden;
    box-shadow:0 10px 40px rgba(0,0,0,.25);min-width:170px;}
  #cardMenu button{display:flex;align-items:center;gap:10px;width:100%;border:none;
    background:none;padding:13px 16px;font-size:14px;color:var(--ink);cursor:pointer;}
  #cardMenu button:active{background:#f1f5f9;}
  #cardMenu button.danger{color:var(--red);}
  #pageNav{position:fixed;right:10px;z-index:25;top:calc(110px + var(--sat));
    display:none;flex-direction:column;gap:6px;}
  #pageNav button{width:38px;height:38px;border:none;border-radius:10px;
    background:rgba(15,23,42,.8);color:#fff;cursor:pointer;display:flex;
    align-items:center;justify-content:center;}
  #zoomCtl{position:fixed;right:12px;z-index:25;bottom:calc(96px + var(--sab));
    display:flex;flex-direction:column;border-radius:14px;overflow:hidden;
    background:rgba(15,23,42,.9);backdrop-filter:blur(8px);
    box-shadow:0 6px 20px rgba(0,0,0,.4);}
  #zoomCtl button{width:46px;height:46px;border:none;background:transparent;
    color:#e2e8f0;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  #zoomCtl button:active{background:rgba(255,255,255,.12);}
  #zoomCtl .sep{height:1px;background:rgba(255,255,255,.14);margin:0 10px;}
</style>
</head>
<body>

<!-- ============ HOME ============ -->
<div id="screenHome">
  <div id="homeHdr">
    <div class="logo">🗺️</div>
    <div><h1>Meus mapas</h1><p id="homeSub">Mapas PDF georreferenciados</p></div>
  </div>
  <div id="cards"></div>
  <button id="fab"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>Adicionar mapa</button>
</div>

<!-- ============ MAPA ============ -->
<div id="screenMap">
  <div id="viewer">
    <div id="wrapper">
      <canvas id="mapCanvas"></canvas>
      <canvas id="hiCanvas"></canvas>
      <div id="overlay">
        <div id="gpsAcc"></div>
        <div id="gpsDot"><div class="d"></div></div>
      </div>
    </div>
  </div>
  <div id="mapHdr">
    <button class="hbtn" id="btnBack"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
    <div class="title" id="mapTitle"></div>
    <button class="hbtn" id="btnKmlTop" title="Exportar KML"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg></button>
  </div>
  <div id="status"></div>
  <div id="pageNav">
    <button id="pgUp"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M18 15l-6-6-6 6"/></svg></button>
    <button id="pgDn"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></button>

  </div>
  <div id="toolbar">
    <button id="btnAdd" title="Marcar ponto"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12S4 16 4 10a8 8 0 1 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg></button>
    <button id="btnGps" title="GPS"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg></button>
    <button id="btnCenter" title="Centralizar em mim"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M2 12h3M19 12h3M12 2v3M12 19v3"/><circle cx="12" cy="12" r="7"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/></svg></button>
    <button id="btnList" title="Pontos"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 6h13M8 12h13M8 18h13"/><circle cx="3.5" cy="6" r="1" fill="currentColor" stroke="none"/><circle cx="3.5" cy="12" r="1" fill="currentColor" stroke="none"/><circle cx="3.5" cy="18" r="1" fill="currentColor" stroke="none"/></svg></button>

<!-- ============ compartilhado ============ -->
<div id="busy"><div class="spin"></div><div id="busyTxt">Processando…</div></div>
<div id="modalBg"><div id="modal">
  <h3 id="mTitle"></h3><p id="mText"></p>
  <div id="mFields"></div>
  <div class="btns"><button id="mCancel">Cancelar</button><button id="mOk">OK</button></div>
</div></div>
<div id="cardMenuBg"><div id="cardMenu">
  <button id="cmRename"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>Renomear</button>

</div></div>
<div id="photoView">

  <img id="pvImg" alt="">

<script>
'use strict';
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const $=id=>document.getElementById(id);
const viewer=$('viewer'),wrapper=$('wrapper'),canvas=$('mapCanvas'),
      ctx=canvas.getContext('2d'),overlay=$('overlay');

/* ================= IndexedDB ================= */
let _db=null;
function idb(){
  if(_db)return Promise.resolve(_db);
  return new Promise((res,rej)=>{
    const r=indexedDB.open('mapas-pdf-gps',1);
    r.onupgradeneeded=()=>r.result.createObjectStore('maps',{keyPath:'id'});
    r.onsuccess=()=>{_db=r.result;res(_db);};
    r.onerror=()=>rej(r.error);
  });
}
async function dbPut(m){const d=await idb();return new Promise((res,rej)=>{
  const t=d.transaction('maps','readwrite');t.objectStore('maps').put(m);
  t.oncomplete=res;t.onerror=()=>rej(t.error);});}
async function dbAll(){const d=await idb();return new Promise((res,rej)=>{
  const r=d.transaction('maps').objectStore('maps').getAll();
  r.onsuccess=()=>res(r.result||[]);r.onerror=()=>rej(r.error);});}
async function dbGet(id){const d=await idb();return new Promise((res,rej)=>{
  const r=d.transaction('maps').objectStore('maps').get(id);
  r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
async function dbDel(id){const d=await idb();return new Promise((res,rej)=>{
  const t=d.transaction('maps','readwrite');t.objectStore('maps').delete(id);
  t.oncomplete=res;t.onerror=()=>rej(t.error);});}

/* ================= geo: parsing GeoPDF ================= */
function buildCorpora(bytes){
  const dec=new TextDecoder('latin1');
  const main=dec.decode(bytes);
  const corpora=[main];
  if(main.indexOf('/GPTS')===-1&&typeof pako!=='undefined'){
    let pos=0,count=0;
    while((pos=main.indexOf('stream',pos))!==-1&&count<3000){
      if(pos>0&&main[pos-1]==='d'){pos+=6;continue;}
      let start=pos+6;
      if(main[start]==='\r')start++;
      if(main[start]==='\n')start++;
      const end=main.indexOf('endstream',start);
      if(end===-1)break;
      try{
        const t=dec.decode(pako.inflate(bytes.subarray(start,end)));
        if(t.indexOf('/GPTS')!==-1)corpora.push(t);
      }catch(e){}
      pos=end+9;count++;
    }
  }
  return corpora;
}
function readArrayAt(text,key,from){
  const i=text.indexOf(key,from||0);
  if(i===-1)return null;
  const a=text.indexOf('[',i);
  if(a===-1||text.slice(i+key.length,a).trim()!=='')return null;
  const b=text.indexOf(']',a);
  if(b===-1)return null;
  const nums=text.slice(a+1,b).trim().split(/[\s,]+/).map(Number);
  return nums.length&&nums.every(isFinite)?nums:null;
}
function readArrayBack(text,key){
  const i=text.lastIndexOf(key);
  if(i===-1)return null;
  return readArrayAt(text,key,i);
}
function findMeasures(bytes,pageBox){
  const out=[];
  for(const text of buildCorpora(bytes)){
    let idx=0;
    while((idx=text.indexOf('/GPTS',idx))!==-1){
      const winStart=Math.max(0,idx-2500);
      const win=text.slice(idx,idx+3000);
      const gpts=readArrayAt(win,'/GPTS');
      if(gpts&&gpts.length>=6&&gpts.length%2===0){
        const back=text.slice(winStart,idx);
        const lpts=readArrayAt(win,'/LPTS')||readArrayBack(back,'/LPTS')
                 ||readArrayAt(win,'/Bounds')||readArrayBack(back,'/Bounds')
                 ||[0,0,0,1,1,1,1,0];
        const bbox=readArrayBack(back,'/BBox')||readArrayAt(win,'/BBox')||pageBox;
        out.push({gpts,lpts,bbox});
      }
      idx+=5;
    }
  }
  return out;
}
/* geo em espaço PDF (pontos): lon=a*X+b*Y+c ; lat=d*X+e*Y+f */
function computeAutoGeo(bytes,pageBox){
  try{
    for(const m of findMeasures(bytes,pageBox)){
      const bx0=Math.min(m.bbox[0],m.bbox[2]),bx1=Math.max(m.bbox[0],m.bbox[2]);
      const by0=Math.min(m.bbox[1],m.bbox[3]),by1=Math.max(m.bbox[1],m.bbox[3]);
      const n=Math.min(m.gpts.length,m.lpts.length)/2|0;
      const pairs=[];let ok=true;
      for(let i=0;i<n;i++){
        const lat=m.gpts[2*i],lon=m.gpts[2*i+1];
        if(Math.abs(lat)>90||Math.abs(lon)>180){ok=false;break;}
        pairs.push({X:bx0+m.lpts[2*i]*(bx1-bx0),Y:by0+m.lpts[2*i+1]*(by1-by0),lat,lon});
      }
      if(!ok||pairs.length<3)continue;
      const g=fitAffine(pairs);
      if(g)return g;
    }
  }catch(e){console.warn('geo parse',e);}
  return null;
}

/* ================= geo: matemática ================= */
function solve3(M,v){
  const A=[[...M[0],v[0]],[...M[1],v[1]],[...M[2],v[2]]];
  for(let c=0;c<3;c++){
    let p=c;
    for(let r=c+1;r<3;r++)if(Math.abs(A[r][c])>Math.abs(A[p][c]))p=r;
    if(Math.abs(A[p][c])<1e-12)return null;
    [A[c],A[p]]=[A[p],A[c]];
    for(let r=0;r<3;r++){
      if(r===c)continue;
      const f=A[r][c]/A[c][c];
      for(let k=c;k<4;k++)A[r][k]-=f*A[c][k];
    }
  }
  return [A[0][3]/A[0][0],A[1][3]/A[1][1],A[2][3]/A[2][2]];
}
function fitAffine(pairs){
  let Sxx=0,Sxy=0,Sx=0,Syy=0,Sy=0,S=pairs.length,
      SxLo=0,SyLo=0,SLo=0,SxLa=0,SyLa=0,SLa=0;
  for(const p of pairs){
    Sxx+=p.X*p.X;Sxy+=p.X*p.Y;Sx+=p.X;Syy+=p.Y*p.Y;Sy+=p.Y;
    SxLo+=p.X*p.lon;SyLo+=p.Y*p.lon;SLo+=p.lon;
    SxLa+=p.X*p.lat;SyLa+=p.Y*p.lat;SLa+=p.lat;
  }
  const M=[[Sxx,Sxy,Sx],[Sxy,Syy,Sy],[Sx,Sy,S]];
  const lo=solve3(M,[SxLo,SyLo,SLo]),la=solve3(M,[SxLa,SyLa,SLa]);
  if(!lo||!la)return null;
  return {a:lo[0],b:lo[1],c:lo[2],d:la[0],e:la[1],f:la[2]};
}

function pdfToGeo(X,Y){return {lon:geo.a*X+geo.b*Y+geo.c,lat:geo.d*X+geo.e*Y+geo.f};}
function geoToPdf(lat,lon){
  const det=geo.a*geo.e-geo.b*geo.d;
  if(Math.abs(det)<1e-18)return null;
  const u=lon-geo.c,v=lat-geo.f;
  return {X:(geo.e*u-geo.b*v)/det,Y:(geo.a*v-geo.d*u)/det};
}
function canvasToGeo(x,y){const p=viewport.convertToPdfPoint(x,y);return pdfToGeo(p[0],p[1]);}
function geoToCanvas(lat,lon){
  const p=geoToPdf(lat,lon);
  if(!p)return null;
  const q=viewport.convertToViewportPoint(p.X,p.Y);
  return {x:q[0],y:q[1]};
}
function metersPerPixel(){
  const cx=canvas.width/2,cy=canvas.height/2;
  const p0=canvasToGeo(cx,cy),p1=canvasToGeo(cx+1,cy),p2=canvasToGeo(cx,cy+1);
  const k=Math.cos(p0.lat*Math.PI/180);
  const d1=Math.hypot((p1.lon-p0.lon)*k,(p1.lat-p0.lat))*111320;
  const d2=Math.hypot((p2.lon-p0.lon)*k,(p2.lat-p0.lat))*111320;
  return (d1+d2)/2;
}

async function importPdf(file){
  const bytes=new Uint8Array(await file.arrayBuffer());
  const doc=await pdfjsLib.getDocument({data:bytes.slice()}).promise;
  const page=await doc.getPage(1);
  const v1=page.getViewport({scale:1});
  const ts=480/v1.width;
  const tvp=page.getViewport({scale:ts});
  const tc=document.createElement('canvas');
  tc.width=Math.floor(tvp.width);tc.height=Math.floor(tvp.height);
  await page.render({canvasContext:tc.getContext('2d'),viewport:tvp}).promise;
  const thumb=tc.toDataURL('image/jpeg',0.72);
  const g=computeAutoGeo(bytes,page.view);
  if(!g){
    doc.destroy();
    throw new Error('este PDF não está georreferenciado. Exporte o mapa como GeoPDF (QGIS: Exportar → PDF, com "Criar PDF geoespacial"; ArcGIS: exportar com georreferência).');
  }
  const rec={
    id:'m'+Date.now()+Math.random().toString(36).slice(2,7),
    name:file.name.replace(/\.pdf$/i,''),
    bytes:bytes.buffer, thumb,
    geo:g,
    markers:[], pages:doc.numPages, added:Date.now()
  };
  doc.destroy();
  await dbPut(rec);
}

function applyView(){

/* re-renderização nítida da área visível (após parar de mexer) */
const hiCanvas=$('hiCanvas'),hictx=hiCanvas.getContext('2d');
let hiTask=null,hiTimer=null,hiGen=0;
function hideHiRes(){hiCanvas.style.display='none';}
function scheduleHiRes(){
  clearTimeout(hiTimer);
  hiTimer=setTimeout(renderHiRes,260);
}
async function renderHiRes(){
  if(!currentPage||!viewport)return;
  const gen=++hiGen;
  const dpr=window.devicePixelRatio||1;
  const baseScale=viewport.scale;
  let k=view.z*dpr;                 // fator extra sobre o canvas base
  if(k<=1.05){hideHiRes();return;}  // base já é nítido nesse zoom
  const vw=viewer.clientWidth,vh=viewer.clientHeight;
  const pad=60;                     // margem para pequenos pans
  let x0=Math.max(0,(0-pad-view.tx)/view.z),y0=Math.max(0,(0-pad-view.ty)/view.z);
  let x1=Math.min(canvas.width,(vw+pad-view.tx)/view.z),y1=Math.min(canvas.height,(vh+pad-view.ty)/view.z);
  if(x1<=x0||y1<=y0){hideHiRes();return;}
  let pw=(x1-x0)*k,ph=(y1-y0)*k;
  const MAXPX=4096*4096;
  if(pw*ph>MAXPX){const r=Math.sqrt(MAXPX/(pw*ph));k*=r;pw*=r;ph*=r;}
  const s2=baseScale*k;
  const vp2=currentPage.getViewport({scale:s2});
  if(hiTask){try{hiTask.cancel();}catch(e){}}
  hiCanvas.width=Math.ceil(pw);hiCanvas.height=Math.ceil(ph);
  hiCanvas.style.left=x0+'px';hiCanvas.style.top=y0+'px';
  hiCanvas.style.width=(x1-x0)+'px';hiCanvas.style.height=(y1-y0)+'px';
  try{
    hiTask=currentPage.render({canvasContext:hictx,viewport:vp2,
      transform:[1,0,0,1,-x0*k,-y0*k]});
    await hiTask.promise;
    if(gen===hiGen)hiCanvas.style.display='block';
  }catch(e){/* render cancelado */}
  hiTask=null;
}
function fitView(){
  const vw=viewer.clientWidth,vh=viewer.clientHeight-70;
  if(vw<10||vh<10){requestAnimationFrame(fitView);return;} // tela ainda não visível
  view.z=Math.min(vw/canvas.width,vh/canvas.height)*0.94;
  view.tx=(vw-canvas.width*view.z)/2;
  view.ty=64+(vh-canvas.height*view.z)/2;
  applyView();
}
function screenToCanvas(cx,cy){
  const r=viewer.getBoundingClientRect();
  return {x:(cx-r.left-view.tx)/view.z,y:(cy-r.top-view.ty)/view.z};
}
const pointers=new Map();
let tap=null,pinch0=null;
viewer.addEventListener('pointerdown',e=>{
  viewer.setPointerCapture(e.pointerId);
  pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(pointers.size===1)tap={x:e.clientX,y:e.clientY,moved:false};
  else tap=null;
  if(pointers.size===2){
    const ps=[...pointers.values()];
    pinch0={d:Math.hypot(ps[0].x-ps[1].x,ps[0].y-ps[1].y),z:view.z,
      mx:(ps[0].x+ps[1].x)/2,my:(ps[0].y+ps[1].y)/2,tx:view.tx,ty:view.ty};
  }
});
viewer.addEventListener('pointermove',e=>{
  const p=pointers.get(e.pointerId);
  if(!p)return;
  const dx=e.clientX-p.x,dy=e.clientY-p.y;
  p.x=e.clientX;p.y=e.clientY;
  if(pointers.size===1){
    if(tap&&Math.hypot(e.clientX-tap.x,e.clientY-tap.y)>8)tap.moved=true;
    if(tap&&tap.moved){view.tx+=dx;view.ty+=dy;follow=false;applyView();}
    else if(!tap){view.tx+=dx;view.ty+=dy;follow=false;applyView();}
  }else if(pointers.size===2&&pinch0){
    const ps=[...pointers.values()];
    const d=Math.hypot(ps[0].x-ps[1].x,ps[0].y-ps[1].y);
    const mx=(ps[0].x+ps[1].x)/2,my=(ps[0].y+ps[1].y)/2;
    const z=Math.min(20,Math.max(0.05,pinch0.z*d/pinch0.d));
    view.tx=mx-(pinch0.mx-pinch0.tx)*(z/pinch0.z);
    view.ty=my-(pinch0.my-pinch0.ty)*(z/pinch0.z);
    view.z=z;follow=false;applyView();
  }
});
function pointerEnd(e){
  pointers.delete(e.pointerId);
  if(pointers.size<2)pinch0=null;
  if(tap&&!tap.moved&&pointers.size===0){handleTap(tap.x,tap.y);}
  if(pointers.size===0)tap=null;
}
viewer.addEventListener('pointerup',pointerEnd);
viewer.addEventListener('pointercancel',pointerEnd);
function zoomBy(f){
  const cx=viewer.clientWidth/2,cy=viewer.clientHeight/2;
  const z=Math.min(20,Math.max(0.05,view.z*f));
  view.tx=cx-(cx-view.tx)*(z/view.z);
  view.ty=cy-(cy-view.ty)*(z/view.z);
  view.z=z;applyView();
}
$('zIn').onclick=()=>zoomBy(1.4);
$('zOut').onclick=()=>zoomBy(1/1.4);
$('zFit').onclick=()=>{follow=false;fitView();};
viewer.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY<0?1.15:1/1.15;
  const z=Math.min(20,Math.max(0.05,view.z*f));
  view.tx=e.clientX-(e.clientX-view.tx)*(z/view.z);
  view.ty=e.clientY-(e.clientY-view.ty)*(z/view.z);
  view.z=z;applyView();
},{passive:false});

/* ================= modal ================= */
function processPhoto(file){
  return new Promise((res,rej)=>{
    const img=new Image();
    img.onload=()=>{
      const M=1600;
      const r=Math.min(1,M/Math.max(img.width,img.height));
      const c=document.createElement('canvas');
      c.width=Math.round(img.width*r);c.height=Math.round(img.height*r);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      URL.revokeObjectURL(img.src);
      res(c.toDataURL('image/jpeg',0.8));
    };
    img.onerror=()=>rej(new Error('imagem inválida'));
    img.src=URL.createObjectURL(file);
  });
}

$('btnAddGps').onclick=async()=>{
  if(!gpsPos){alert('Ligue o GPS e aguarde o sinal.');return;}
  const r=await askModal('Ponto na minha posição',
    `${fmt(gpsPos.lat)}, ${fmt(gpsPos.lon)} (±${Math.round(gpsPos.acc)} m)`,
    [{label:'Nome do ponto',val:'Ponto '+(markers.length+1)}],{photo:true});
  if(!r)return;
  markers.push({id:Date.now(),name:r.vals[0]||('Ponto '+(markers.length+1)),
    lat:gpsPos.lat,lon:gpsPos.lon,photo:r.photo||null});
  persist();redrawAll();
};
/* visualizador de foto */
let pvMarker=null;
function openPhotoViewer(m){
  pvMarker=m;
  $('pvName').textContent=m.name;
  $('pvImg').src=m.photo;
  $('photoView').classList.add('open');
}
$('pvClose').onclick=()=>$('photoView').classList.remove('open');
$('pvRemove').onclick=()=>{
  if(pvMarker&&confirm('Remover a foto deste ponto?')){
    pvMarker.photo=null;persist();renderList();
  }
  $('photoView').classList.remove('open');
};
function editPhoto(m){
  const inp=$('photoInput');
  inp.onchange=async e=>{
    const f=e.target.files[0];e.target.value='';
    if(!f)return;
    try{m.photo=await processPhoto(f);persist();renderList();}
    catch(err){alert('Não foi possível ler a foto.');}
  };
  inp.click();
}
const PIN_SVG='<svg width="30" height="30" viewBox="0 0 24 24" fill="#dc2626" stroke="#fff" stroke-width="1.3"><path d="M20 10c0 6-8 12-8 12S4 16 4 10a8 8 0 1 1 16 0Z"/><circle cx="12" cy="10" r="3" fill="#fff" stroke="none"/></svg>';
function redrawMarkers(){
  overlay.querySelectorAll('[data-mk]').forEach(e=>e.remove());
  if(!geo)return;
  for(const m of markers){
    const p=geoToCanvas(m.lat,m.lon);
    if(!p)continue;
    const d=document.createElement('div');
    d.className='marker';d.dataset.mk='1';
    d.style.left=p.x+'px';d.style.top=p.y+'px';
    d.innerHTML=`<div class="pin">${PIN_SVG}</div><div class="lbl"></div>`;
    d.querySelector('.lbl').textContent=m.name;
    overlay.appendChild(d);
  }
}
function renderList(){
  $('panelTitle').textContent=`Pontos (${markers.length})`;
  const l=$('ptList');l.innerHTML='';
  if(!markers.length){
    l.innerHTML='<div class="empty">Nenhum ponto marcado ainda.<br>Use o botão de alfinete e toque no mapa,<br>ou "+ no GPS" para marcar onde você está.</div>';
    return;
  }
  for(const m of markers){
    const row=document.createElement('div');row.className='row';
    let lead;
    if(m.photo){
      lead=document.createElement('img');lead.className='pthumb';lead.src=m.photo;
      lead.onclick=()=>openPhotoViewer(m);
    }else{
      lead=document.createElement('div');lead.className='dot';
    }
    const inf=document.createElement('div');inf.className='inf';
    const nm=document.createElement('div');nm.className='nm';nm.textContent=m.name;
    const co=document.createElement('div');co.className='co';co.textContent=`${fmt(m.lat)}, ${fmt(m.lon)}`;
    inf.append(nm,co);
    const bCam=document.createElement('button');
    bCam.title=m.photo?'Trocar foto':'Adicionar foto';
    bCam.innerHTML='<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>';
    bCam.onclick=()=>editPhoto(m);
    const bGo=document.createElement('button');
    bGo.innerHTML='<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>';
    bGo.onclick=()=>{centerOnGeo(m.lat,m.lon);$('panel').classList.remove('open');};
    const bDel=document.createElement('button');
    bDel.innerHTML='<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>';
    bDel.onclick=()=>{if(confirm(`Excluir "${m.name}"?`)){markers=markers.filter(x=>x.id!==m.id);persist();redrawAll();}};
    row.append(lead,inf,bCam,bGo,bDel);l.appendChild(row);
  }
}
function redrawAll(){redrawMarkers();renderList();updateGpsDot();}
$('btnList').onclick=()=>{renderList();$('panel').classList.toggle('open');};
$('btnClosePanel').onclick=()=>$('panel').classList.remove('open');

/* ================= GPS ================= */
$('btnGps').onclick=()=>{if(!gpsOn)startGps();else stopGps();};
function startGps(){
  if(!navigator.geolocation){alert('Este navegador não suporta geolocalização.');return;}
  gpsOn=true;follow=true;$('btnGps').classList.add('on');
  setStatus('Obtendo sinal de GPS…',true);
  gpsWatch=navigator.geolocation.watchPosition(pos=>{
    gpsPos={lat:pos.coords.latitude,lon:pos.coords.longitude,acc:pos.coords.accuracy||0};
    updateGpsDot();
    let msg=`${fmt(gpsPos.lat)}, ${fmt(gpsPos.lon)} · ±${Math.round(gpsPos.acc)} m`;
    if(geo){
      const p=geoToCanvas(gpsPos.lat,gpsPos.lon);
      if(p&&(p.x<-canvas.width*0.2||p.y<-canvas.height*0.2||p.x>canvas.width*1.2||p.y>canvas.height*1.2))
        msg+=' — você está FORA da área do mapa';
      if(follow&&p)centerOnGeo(gpsPos.lat,gpsPos.lon,true);
    }else msg+=' — mapa sem georreferenciamento';
    setStatus(msg,true);
  },err=>{
    setStatus('Erro de GPS: '+err.message+
      (location.protocol==='file:'?' — abra o app via HTTPS (hospedado) para o GPS funcionar':''),true);
  },{enableHighAccuracy:true,maximumAge:2000,timeout:20000});
}
function stopGps(){
  if(!gpsOn)return;
  gpsOn=false;follow=false;$('btnGps').classList.remove('on');
  if(gpsWatch!=null)navigator.geolocation.clearWatch(gpsWatch);
  gpsWatch=null;gpsHide();setStatus('GPS desligado');
}
function gpsHide(){$('gpsDot').style.display='none';$('gpsAcc').style.display='none';}
function updateGpsDot(){
  if(!gpsPos||!geo){gpsHide();return;}
  const p=geoToCanvas(gpsPos.lat,gpsPos.lon);
  if(!p){gpsHide();return;}
  const dot=$('gpsDot');
  dot.style.display='block';dot.style.left=p.x+'px';dot.style.top=p.y+'px';
  const mpp=metersPerPixel();
  if(mpp>0&&gpsPos.acc>0){
    const r=gpsPos.acc/mpp,ac=$('gpsAcc');
    ac.style.display='block';ac.style.left=p.x+'px';ac.style.top=p.y+'px';
    ac.style.width=(2*r)+'px';ac.style.height=(2*r)+'px';
  }
}
function centerOnGeo(lat,lon,keepFollow){
  if(!geo)return;
  const p=geoToCanvas(lat,lon);
  if(!p)return;
  if(!keepFollow)follow=false;
  view.tx=viewer.clientWidth/2-p.x*view.z;
  view.ty=viewer.clientHeight/2-p.y*view.z;
  applyView();
}
$('btnCenter').onclick=()=>{
  if(!gpsPos){alert('Ligue o GPS primeiro.');return;}
  if(!geo){alert('Este mapa não está georreferenciado.');return;}
  follow=true;centerOnGeo(gpsPos.lat,gpsPos.lon,true);
};

/* ================= KML / KMZ ================= */
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function buildKml(withPhotoRefs){
  const pl=markers.map(m=>{
    const desc=(withPhotoRefs&&m.photo)?
      `\n    <description><![CDATA[<img src="files/p${m.id}.jpg" width="480"/>]]></description>`:'';
    return `  <Placemark>
    <name>${esc(m.name)}</name>${desc}
    <Point><coordinates>${m.lon.toFixed(8)},${m.lat.toFixed(8)},0</coordinates></Point>
  </Placemark>`;
  }).join('\n');
  return `<?xml version="1.0" encoding="UTF-8"?>
<kml xmlns="http://www.opengis.net/kml/2.2">
<Document>
  <name>${esc(currentMap?currentMap.name:'mapa')} - pontos</name>
${pl}
</Document>
</kml>`;
}
function downloadBlob(blob,name){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=name;
  document.body.appendChild(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},2000);
}
async function exportKml(){
  if(!markers.length){alert('Nenhum ponto para exportar.');return;}
  const base=(currentMap?currentMap.name:'pontos');
  const hasPhotos=markers.some(m=>m.photo)&&typeof JSZip!=='undefined';
  if(!hasPhotos){
    downloadBlob(new Blob([buildKml(false)],
      {type:'application/vnd.google-earth.kml+xml'}),base+'-pontos.kml');
    setStatus('KML exportado ✔ (veja seus downloads)');
    return;
  }
  /* KMZ = zip com doc.kml + fotos, abre no Google Earth com as fotos */
  const zip=new JSZip();
  zip.file('doc.kml',buildKml(true));
  for(const m of markers){
    if(!m.photo)continue;
    zip.file(`files/p${m.id}.jpg`,m.photo.split(',')[1],{base64:true});
  }
  const blob=await zip.generateAsync({type:'blob',
    mimeType:'application/vnd.google-earth.kmz'});
  downloadBlob(blob,base+'-pontos.kmz');
  setStatus('KMZ exportado ✔ com fotos embutidas (veja seus downloads)');
}
$('btnKml').onclick=exportKml;
$('btnKmlTop').onclick=exportKml;

window.addEventListener('resize',()=>{if(pdfDoc)applyView();});
renderHome();
